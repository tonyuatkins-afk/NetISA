# DOSBox-X configuration for NetISA development relay
# This config is used by dosrun.py to run DOS commands headlessly.

[sdl]
output        = surface
autolock      = false
waitonerror   = false

[dosbox]
title         = NetISA DevRelay
fastbcastv    = true
# machine type affects available I/O ports; use pcjr or tandy for testing
# specific video modes, otherwise leave as default (svga_s3)
machine       = svga_s3

[cpu]
core          = normal
cputype       = 8086
# F-27: cycles = auto adjusts based on app needs (more deterministic
# than max for capture timing and test reproducibility). Use cycles =
# max if the relay feels slow on real hardware.
cycles        = auto

[render]
scaler        = none

[serial]
serial1       = disabled
serial2       = disabled
serial3       = disabled
serial4       = disabled

[parallel]
parallel1     = disabled

[printer]
printer       = false

[dos]
hard drive data rate limit = 0

[autoexec]
# dosrun.py generates this section dynamically at runtime.
# Any commands placed here are ignored; see generate_conf() in dosrun.py.
