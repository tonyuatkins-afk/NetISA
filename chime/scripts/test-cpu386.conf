# DOSBox-X conf for headless CHIME test runs.

[sdl]
output=surface
autolock=false
waitonerror=false

[dosbox]
machine=svga_s3
memsize=4
nopromptfolder=true

[cpu]
core=auto
cputype=386
cycles=fixed 25000

[render]
scaler=none

[serial]
serial1=disabled
serial2=disabled

[parallel]
parallel1=disabled

[printer]
printer=false

[autoexec]
mount C "C:\Development\NetISA\chime"
C:
TESTTIME.EXE > C:\TESTTIME.OUT
EXIT
