# /HELP variant: prints the cmdline reference and exits. Useful for
# documenting the full flag list in a single screenshot.

[sdl]
windowresolution=original
output=opengl
fullscreen=false
autolock=false

[dosbox]
machine=svga_s3
memsize=4
nopromptfolder=true

[render]
aspect=true
scaler=normal2x

[cpu]
core=auto
cputype=386
cycles=fixed 25000

[serial]
serial1=disabled
serial2=disabled

[parallel]
parallel1=disabled

[autoexec]
@echo off
mount C "C:\Development\NetISA\chime"
C:
CHIME.EXE /HELP
