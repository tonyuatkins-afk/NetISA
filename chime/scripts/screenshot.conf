# DOSBox-X config for CHIME screenshot capture.
#
# /STUBNET activates CHIME's synthetic NetISA backend, which returns a canned
# HTTP response (Date: Sat, 25 Apr 2026 14:30:42 GMT). That gives a
# deterministic timestamp for the captured frame regardless of host time.

[sdl]
windowresolution=original
output=opengl
fullscreen=false
autolock=false

[dosbox]
machine=svga_s3
memsize=4
nopromptfolder=true

[render]
aspect=true
scaler=normal2x

[cpu]
core=auto
cputype=386
cycles=fixed 25000

[serial]
serial1=disabled
serial2=disabled

[parallel]
parallel1=disabled

[autoexec]
@echo off
mount C "C:\Development\NetISA\chime"
C:
CHIME.EXE /STUBNET
