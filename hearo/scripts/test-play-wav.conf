# Headless test of TESTPLAY against TONE.WAV via SB16 in DOSBox-X.

[sdl]
output=surface
autolock=false
waitonerror=false

[dosbox]
machine=svga_s3
memsize=16
nopromptfolder=true

[cpu]
core=auto
cputype=pentium
cycles=fixed 50000

[render]
scaler=none

[sblaster]
sbtype=sb16
sbbase=220
irq=5
dma=1
hdma=5
oplmode=opl3

[gus]
gus=false

[serial]
serial1=disabled

[autoexec]
mount C "C:\Development\NetISA\hearo"
C:
SET BLASTER=A220 I5 D1 H5 P330 T6
TESTPLAY.EXE /T3 data\TONE.WAV > C:\PLAYTEST.OUT
EXIT
