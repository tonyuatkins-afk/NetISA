# Standard tier: 386DX / 4 MB / VGA / Sound Blaster Pro.

[sdl]
windowresolution=original
output=opengl
fullscreen=false
autolock=false

[dosbox]
machine=vgaonly
memsize=4
nopromptfolder=true

[render]
aspect=true
scaler=normal2x

[cpu]
core=auto
cputype=386
cycles=fixed 12000

[sblaster]
sbtype=sbpro2
sbbase=220
irq=5
dma=1
oplmode=opl3

[gus]
gus=false

[autoexec]
@echo off
mount C "C:\Development\NetISA\hearo"
C:
SET BLASTER=A220 I5 D1 T4
HEARO.EXE
