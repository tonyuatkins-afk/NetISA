# Headless test of TESTPLAY against TONE.WAV via SB Pro 2 in DOSBox-X.
# This exercises the SB Pro 2 high-speed-mode path that the YMF715 hit on
# real iron (22 kHz stereo -> TC=234 -> command 0x90 not 0x1C).

[sdl]
output=surface
autolock=false
waitonerror=false

[dosbox]
machine=svga_s3
memsize=16
nopromptfolder=true

[cpu]
core=auto
cputype=pentium
cycles=fixed 50000

[render]
scaler=none

[sblaster]
sbtype=sbpro2
sbbase=220
irq=5
dma=1
oplmode=opl3

[gus]
gus=false

[serial]
serial1=disabled

[autoexec]
mount C "C:\Development\NetISA\hearo"
C:
SET BLASTER=A220 I5 D1 P330 T4
TESTPLAY.EXE /T3 data\TONE.WAV > C:\PLAYWAV.OUT
EXIT
