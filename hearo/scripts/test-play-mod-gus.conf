# MOD playback with GUS enabled. SB16 still drives timing/silent PCM;
# GUS provides hardware voices.

[sdl]
output=surface
autolock=false
waitonerror=false

[dosbox]
machine=svga_s3
memsize=16
nopromptfolder=true

[cpu]
core=auto
cputype=pentium
cycles=fixed 50000

[render]
scaler=none

[sblaster]
sbtype=sb16
sbbase=220
irq=5
dma=1
hdma=5
oplmode=opl3

[gus]
gus=true
gusrate=44100
gusbase=240
gusirq=11
gusdma=3
ultradir=C:\ULTRASND

[autoexec]
mount C "C:\Development\NetISA\hearo"
C:
SET BLASTER=A220 I5 D1 H5 P330 T6
SET ULTRASND=240,3,3,11,5
TESTPLAY.EXE /T4 data\TONE.MOD > C:\PLAYGUS.OUT
EXIT
