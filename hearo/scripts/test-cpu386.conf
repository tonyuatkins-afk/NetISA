# DOSBox-X conf for headless HEARO/CHIME test runs.
# 386 CPU + 4 MB XMS, autoexec runs the test then exits cleanly.

[sdl]
output=surface
autolock=false
waitonerror=false

[dosbox]
machine=svga_s3
memsize=4
nopromptfolder=true

[cpu]
core=auto
cputype=386
cycles=fixed 25000

[render]
scaler=none

[serial]
serial1=disabled
serial2=disabled
serial3=disabled
serial4=disabled

[parallel]
parallel1=disabled

[printer]
printer=false

[dos]
hard drive data rate limit=0

[autoexec]
mount C "C:\Development\NetISA\hearo"
C:
HEARO.EXE /UNLOCKS > C:\HEAROUNL.OUT
HEARO.EXE /VERSION > C:\HEAROVER.OUT
EXIT
