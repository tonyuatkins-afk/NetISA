# DOSBox-X config for HEARO boot-screen capture.
#
# Drives a generic Workstation-tier machine (486DX2, SVGA, SB16) so the boot
# screen shows a healthy unlock count without depending on local hardware.
# Adjust [cpu] cputype/cycles or [sblaster] to capture other personalities
# (286/EGA/AdLib for the Minimum tier, Pentium/SVGA1024/AWE32 for Maximum).

[sdl]
windowresolution=original
output=opengl
fullscreen=false
autolock=false

[dosbox]
machine=svga_s3
memsize=16
nopromptfolder=true

[render]
aspect=true
scaler=normal2x

[cpu]
core=auto
cputype=486
cycles=fixed 50000

[sblaster]
sbtype=sb16
sbbase=220
irq=5
dma=1
hdma=5
oplmode=opl3

[gus]
gus=true
gusbase=240
gusrate=44100
gusirq=5
gusdma=3
ultradir=C:\ULTRASND

[autoexec]
@echo off
mount C "C:\Development\NetISA\hearo"
C:
SET BLASTER=A220 I5 D1 H5 P330 T6
SET ULTRASND=240,3,3,5,5
HEARO.EXE
