# Minimum tier: 286 / 1 MB / EGA / AdLib only.
# Demonstrates the boot screen on the floor configuration.

[sdl]
windowresolution=original
output=opengl
fullscreen=false
autolock=false

[dosbox]
machine=ega
memsize=1
nopromptfolder=true

[render]
aspect=true
scaler=normal2x

[cpu]
core=auto
cputype=286
cycles=fixed 6000

[sblaster]
sbtype=none

[gus]
gus=false

[mixer]
nosound=true

[autoexec]
@echo off
mount C "C:\Development\NetISA\hearo"
C:
HEARO.EXE
